name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - native-gui
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows package
    runs-on: windows-latest

    env:
      WAILS_VERSION: v2.10.2
      ARTIFACT_NAME: ssh-forwarder-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build production binary
        run: wails build -clean

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/bin/ssh-forwarder.exe dist/${env:ARTIFACT_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "dist/${env:ARTIFACT_NAME}"
          if (gh release view $tag *> $null) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --generate-notes
          }
